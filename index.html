<!doctype html>
<html lang="zh-CN" theme-mode="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>导航页</title>
  <link id="favicon-link" rel="icon" type="image/png" href="./assets/favicon.png">
  <link rel="stylesheet" href="./assets/font/iconfont.css">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("themeMode");
        var mode = stored === "light" || stored === "dark"
          ? stored
          : ((window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light");
        document.documentElement.setAttribute("theme-mode", mode);
      } catch (error) {
        document.documentElement.setAttribute("theme-mode", "light");
      }
    })();
  </script>
  <style>
    :root {
      --gray-o1: rgba(255, 255, 255, 0.1);
      --gray-o2: rgba(255, 255, 255, 0.2);
      --gray-o3: rgba(255, 255, 255, 0.3);
      --gray-o4: rgba(255, 255, 255, 0.4);
      --gray-o5: rgba(255, 255, 255, 0.5);
      --gray-o6: rgba(255, 255, 255, 0.6);
      --gray-o7: rgba(255, 255, 255, 0.7);
      --gray-o8: rgba(255, 255, 255, 0.8);
      --gray-o9: rgba(255, 255, 255, 0.9);
      --gray-0: #ffffff;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --red-400: #f87171;
      --red-500: #ef4444;
      --green-500: #10b981;
      --blue-100: #dbeafe;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --danger: #dc3545;
      --brand: #60a5fa;
      --brand-soft: #dbeafe;
      --radius-md: 3px;
      --radius-sm: 2px;
      --content-max: 1260px;
      --edge-pad: 20px;
      --panel-pad: 10px;
      --section-gap: 10px;
      --panel-head-h: 40px;
      --transition: 180ms ease;
      --hero-image-light: url("./assets/wallpaper/cat.png");
      --hero-image-dark: url("./assets/wallpaper/cat.png");
      --hero-image-current: var(--hero-image-light);
      --hero-overlay-start: rgba(17, 24, 39, 0.42);
      --hero-overlay-end: rgba(17, 24, 39, 0.3);
    }

    :root[theme-mode='dark'] {
      --gray-o9: rgba(255, 255, 255, 0.1);
      --gray-o8: rgba(255, 255, 255, 0.2);
      --gray-o7: rgba(255, 255, 255, 0.3);
      --gray-o6: rgba(255, 255, 255, 0.4);
      --gray-o5: rgba(255, 255, 255, 0.5);
      --gray-o4: rgba(255, 255, 255, 0.6);
      --gray-o3: rgba(255, 255, 255, 0.7);
      --gray-o2: rgba(255, 255, 255, 0.8);
      --gray-o1: rgba(255, 255, 255, 0.9);
      --gray-900: #f9fafb;
      --gray-800: #f3f4f6;
      --gray-700: #e5e7eb;
      --gray-600: #d1d5db;
      --gray-500: #9ca3af;
      --gray-400: #6b7280;
      --gray-300: #4b5563;
      --gray-200: #374151;
      --gray-100: #1f2937;
      --gray-50: #111827;
      --gray-0: #000000;
      --red-400: #ef4444;
      --red-500: #f87171;
      --green-500: #34d399;
      --blue-100: #1e40af;
      --blue-400: #3b82f6;
      --blue-500: #60a5fa;
      --danger: #f87171;
      --brand: #60a5fa;
      --brand-soft: #1e3a8a;
      --hero-image-current: var(--hero-image-dark);
      --hero-overlay-start: rgba(2, 6, 23, 0.74);
      --hero-overlay-end: rgba(2, 6, 23, 0.56);
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      -ms-overflow-style: none;
      scrollbar-width: none;
      width: 100%;
      max-width: 100%;
    }

    html::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    body {
      margin: 0;
      font-size: 16px;
      line-height: 1.56;
      color: var(--gray-600);
      min-height: 100vh;
      width: 100%;
      max-width: 100%;
      background: var(--gray-0);
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    li {
      list-style: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .hero {
      position: relative;
      min-height: 285px;
      width: 100%;
      color: var(--gray-50);
      background-image:
        linear-gradient(0deg, var(--hero-overlay-start), var(--hero-overlay-end)),
        var(--hero-image-current);
      background-size: cover;
      background-position: center center;
      overflow: visible;
      border-bottom: none;
      z-index: 20;
    }

    .hero::before {
      content: none;
    }

    .hero-inner {
      position: relative;
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 0 max(var(--edge-pad), env(safe-area-inset-right)) 16px max(var(--edge-pad), env(safe-area-inset-left));
      z-index: 1;
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      min-height: 75px;
      width: 100%;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
    }

    .top-center {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 12px;
      color: var(--gray-50);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.01em;
      text-align: left;
      margin: 0;
      margin-right: auto;
    }

    .top-sep {
      opacity: 0.7;
      font-size: 0.8em;
      user-select: none;
    }

    .theme-switch {
      border: 0;
      border-radius: 0;
      width: 44px;
      height: 44px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--gray-50);
      cursor: pointer;
      transition: var(--transition);
      appearance: none;
      -webkit-appearance: none;
    }

    .theme-switch-symbol {
      font-size: 24px;
      line-height: 1;
      display: inline-block;
    }

    .github-link {
      text-decoration: none;
    }

    .github-link .iconfont {
      font-size: 22px;
      line-height: 1;
      display: inline-block;
    }

    .theme-switch:hover {
      background: transparent;
      color: var(--gray-0);
    }

    :root[theme-mode='dark'] .theme-switch {
      background: transparent;
      border: 0;
      color: rgba(241, 245, 249, 0.9);
    }

    :root[theme-mode='dark'] .theme-switch:hover {
      background: transparent;
      color: #ffffff;
    }

    .clock-main,
    .region-main,
    .weather-main {
      white-space: nowrap;
      font-size: 14px;
      line-height: 1.3;
      font-weight: 500;
    }

    .search-shell {
      width: min(720px, 100%);
      margin: 34px auto 0;
      animation: float-in 450ms ease;
      position: relative;
      z-index: 1200;
    }

    .engine-tabs {
      display: flex;
      justify-content: space-around;
      gap: 0;
      margin-bottom: 0;
      flex-wrap: wrap;
      scrollbar-width: thin;
      position: absolute;
      top: -50px;
      left: 0;
      width: 100%;
      color: var(--gray-50);
    }

    .engine-tabs::-webkit-scrollbar,
    .group-tabs::-webkit-scrollbar {
      height: 6px;
    }

    .engine-tabs::-webkit-scrollbar-thumb,
    .group-tabs::-webkit-scrollbar-thumb {
      background: #c7d2e4;
      border-radius: 999px;
    }

    .engine-tab {
      border: none;
      background: transparent;
      color: inherit;
      border-radius: 0;
      padding: 5px 10px;
      font: inherit;
      font-weight: 500;
      font-size: 16px;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      min-height: 36px;
      opacity: 0.82;
    }

    .engine-tab:hover {
      color: var(--gray-0);
      background: transparent;
      opacity: 1;
      transform: translateY(-1px);
    }

    .engine-tab.active {
      color: var(--gray-0);
      background: transparent;
      border-color: transparent;
      opacity: 1;
      font-weight: 700;
      transform: translateY(-2px);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      animation: engine-tab-float 2.2s ease-in-out infinite;
    }

    .engine-tab.active::after {
      content: none;
    }

    .search-form {
      display: flex;
      align-items: center;
      gap: 0;
      height: 52px;
      border-radius: 3px;
      border: none;
      background: var(--gray-o7);
      padding: 0;
      box-shadow: none;
    }

    .search-mark {
      width: 54px;
      height: 100%;
      border-radius: 0;
      display: grid;
      place-items: center;
      background: transparent;
      color: var(--gray-700);
      user-select: none;
      border: none;
      flex: 0 0 54px;
    }

    .search-mark .iconfont {
      font-size: 26px;
      line-height: 1;
      font-weight: 500;
    }

    .icon-fallback {
      display: none;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--gray-700);
      letter-spacing: 0.01em;
    }

    .search-input {
      border: none;
      outline: none;
      background: transparent;
      color: var(--gray-700);
      font: inherit;
      font-size: 16px;
      min-width: 0;
      width: 100%;
      height: 100%;
      flex: 1;
      padding: 0 12px;
    }

    .search-input::placeholder {
      color: var(--gray-600);
    }

    .search-btn {
      border: none;
      border-radius: 0;
      width: 54px;
      height: 100%;
      padding: 0;
      background: transparent;
      color: var(--gray-700);
      font: inherit;
      cursor: pointer;
      transition: var(--transition);
      display: grid;
      place-items: center;
      flex: 0 0 54px;
    }

    .search-btn:hover {
      background: transparent;
      color: var(--gray-800);
    }

    .search-btn .iconfont {
      font-size: 26px;
      line-height: 1;
    }

    .search-tip {
      min-height: 0;
      margin: 8px 2px 0;
      font-size: 0.875rem;
      line-height: 1.45;
      color: rgba(241, 245, 249, 0.92);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.28);
    }

    .search-tip:empty {
      display: none;
    }

    .search-tip.error {
      color: #fecaca;
    }

    .site-search-panel {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 9999;
      max-height: min(360px, 65vh);
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-gutter: stable both-edges;
      scrollbar-color: var(--gray-300) var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-md);
      background: var(--gray-0);
      box-shadow: 0 10px 24px -14px rgba(15, 23, 42, 0.45);
      padding: 6px;
    }

    .site-search-panel::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .site-search-panel::-webkit-scrollbar-track {
      background: var(--gray-50);
      border-radius: 999px;
    }

    .site-search-panel::-webkit-scrollbar-thumb {
      background: var(--gray-300);
      border-radius: 999px;
      border: 2px solid var(--gray-50);
    }

    .site-search-panel::-webkit-scrollbar-thumb:hover {
      background: var(--gray-400);
    }

    .site-search-panel[hidden] {
      display: none;
    }

    .site-search-item {
      display: block;
      padding: 9px 10px;
      margin-bottom: 4px;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      background: var(--gray-0);
      color: var(--gray-700);
      transition: var(--transition);
    }

    .site-search-item:last-child {
      margin-bottom: 0;
    }

    .site-search-item:hover,
    .site-search-item:focus-visible {
      color: var(--blue-500);
      background: var(--gray-50);
      border-color: var(--gray-200);
      outline: none;
    }

    .site-search-title {
      display: block;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 600;
      color: inherit;
      word-break: break-word;
    }

    .site-search-url {
      margin-top: 1px;
      display: block;
      font-size: 12.5px;
      color: inherit;
      opacity: 0.78;
      word-break: break-all;
    }

    .site-search-item:hover .site-search-url,
    .site-search-item:focus-visible .site-search-url {
      opacity: 1;
    }

    .site-search-empty,
    .site-search-more {
      padding: 8px 10px;
      margin: 2px 0 0;
      font-size: 0.85rem;
      color: var(--gray-600);
    }

    .site-search-more {
      border-top: 1px solid var(--gray-200);
      background: var(--gray-50);
      border-radius: var(--radius-sm);
    }

    :root[theme-mode='dark'] .search-form {
      background: rgba(17, 24, 39, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 14px 28px -20px rgba(0, 0, 0, 0.85);
    }

    :root[theme-mode='dark'] .search-mark,
    :root[theme-mode='dark'] .search-input,
    :root[theme-mode='dark'] .search-btn,
    :root[theme-mode='dark'] .icon-fallback {
      color: var(--gray-700);
    }

    :root[theme-mode='dark'] .search-input::placeholder {
      color: var(--gray-500);
    }

    :root[theme-mode='dark'] .site-search-panel {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(17, 24, 39, 0.96);
      box-shadow: 0 10px 24px -14px rgba(2, 6, 23, 0.95);
      scrollbar-color: rgba(148, 163, 184, 0.56) rgba(30, 41, 59, 0.78);
    }

    :root[theme-mode='dark'] .site-search-panel::-webkit-scrollbar-track {
      background: rgba(30, 41, 59, 0.78);
    }

    :root[theme-mode='dark'] .site-search-panel::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.56);
      border-color: rgba(30, 41, 59, 0.78);
    }

    :root[theme-mode='dark'] .site-search-panel::-webkit-scrollbar-thumb:hover {
      background: rgba(203, 213, 225, 0.72);
    }

    :root[theme-mode='dark'] .site-search-item {
      background: rgba(30, 41, 59, 0.4);
      border-color: transparent;
    }

    :root[theme-mode='dark'] .site-search-item:hover,
    :root[theme-mode='dark'] .site-search-item:focus-visible {
      background: rgba(51, 65, 85, 0.7);
      border-color: rgba(148, 163, 184, 0.4);
    }

    :root[theme-mode='dark'] .site-search-more {
      border-top-color: rgba(148, 163, 184, 0.3);
      background: rgba(30, 41, 59, 0.62);
    }

    /* Keep hero texts readable on dark wallpaper */
    :root[theme-mode='dark'] .top-center,
    :root[theme-mode='dark'] .engine-tabs {
      color: rgba(241, 245, 249, 0.9);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }

    :root[theme-mode='dark'] .engine-tab:hover,
    :root[theme-mode='dark'] .engine-tab.active {
      color: #ffffff;
    }

    .main {
      width: 100%;
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 0 max(var(--edge-pad), env(safe-area-inset-right)) 26px max(var(--edge-pad), env(safe-area-inset-left));
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 10px;
      align-items: start;
      background: var(--gray-50);
      position: relative;
      z-index: 1;
    }

    .main.single-column {
      grid-template-columns: 1fr;
    }

    .main.single-column .hot-panel {
      position: static;
    }

    .is-hidden {
      display: none !important;
    }

    .panel {
      background: var(--gray-0);
      border: 0;
      border-radius: var(--radius-sm);
      box-shadow: none;
    }

    .bookmarks {
      padding: 10px 0 20px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: var(--panel-head-h);
      margin: 0;
      padding: 10px 20px;
    }

    .section-title {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 18px;
      line-height: 1.25;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-weight: 500;
      color: var(--gray-700);
    }

    .section-title .iconfont {
      font-size: 20px;
      font-weight: 500;
    }

    .group-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      margin: 0 20px;
      padding: 10px;
      border: 0;
      border-radius: 3px;
      background: var(--gray-50);
    }

    .group-tab {
      border: 1px solid #0000;
      border-radius: 3px;
      padding: 10px;
      background: #0000;
      color: var(--gray-600);
      font: inherit;
      font-size: 14.5px;
      font-weight: 400;
      cursor: pointer;
      transition: transform 220ms cubic-bezier(0.2, 0.78, 0.24, 1), background-color 180ms ease, color 180ms ease, border-color 180ms ease;
      white-space: nowrap;
      min-height: 40px;
      width: 110px;
      text-align: center;
      transform-origin: center bottom;
      will-change: transform;
      position: relative;
      z-index: 0;
    }

    .group-tab:hover {
      background: var(--gray-100);
      transform: translateY(-8px) scale(1.03);
      z-index: 3;
    }

    .group-tab:active {
      transform: translateY(-3px) scale(1.015);
    }

    .group-tab.active {
      background: transparent;
      color: var(--red-500);
      border-color: transparent;
    }

    .bookmark-sections {
      display: grid;
      gap: var(--section-gap);
      padding: 10px;
    }

    .bookmark-section {
      background: var(--gray-0);
      border: 0;
      border-radius: 2px;
      padding: 10px;
      box-shadow: none;
    }

    .bookmark-section-head {
      margin: 0 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--gray-700);
      font-size: 17px;
      font-weight: 500;
    }

    .bookmark-section-head .iconfont {
      color: inherit;
      font-size: 20px;
      font-weight: 500;
    }

    .site-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 180px));
      justify-content: start;
    }

    .site-card {
      position: relative;
      display: block;
      box-sizing: border-box;
      width: 180px;
      height: 58px;
      background: var(--gray-0);
      border: 1px solid rgba(0, 0, 0, 0.02);
      border-radius: 3px;
      padding: 8px;
      transition: transform 220ms cubic-bezier(0.2, 0.78, 0.24, 1);
      animation: rise-in 260ms ease both;
      box-shadow: 0 0 20px -5px rgba(158, 158, 158, 0.2);
      color: var(--gray-600);
      overflow: hidden;
      transform-origin: center bottom;
      will-change: transform;
      z-index: 0;
    }

    .site-card:hover,
    .site-card.is-hover {
      transform: translateY(-14px) scale(1.06);
      box-shadow: none;
      border-color: transparent;
      z-index: 3;
    }

    .site-card:active {
      transform: translateY(-5px) scale(1.03);
    }

    .site-icon {
      position: absolute;
      left: 10px;
      top: 9px;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: var(--gray-700);
      background: var(--gray-100);
      user-select: none;
      border: 0;
      transition: transform 220ms ease;
    }

    .site-card:hover .site-icon,
    .site-card.is-hover .site-icon {
      transform: translateY(-2px) scale(1.08);
    }

    .site-card > span:last-child {
      display: block;
      margin-left: 56px;
      width: calc(100% - 56px);
    }

    .site-title {
      display: block;
      font-size: 16px;
      font-weight: 500;
      color: var(--gray-700);
      line-height: 1.35;
      margin-bottom: 3px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .site-desc {
      display: block;
      color: var(--gray-500);
      font-size: 13px;
      line-height: 1.45;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      border: 1px dashed var(--gray-300);
      border-radius: 3px;
      padding: 14px;
      color: var(--gray-500);
      background: var(--gray-50);
    }

    .hot-panel {
      padding: 10px 20px 14px;
      position: sticky;
      top: 10px;
    }

    .hot-head {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: var(--panel-head-h);
      margin-bottom: 8px;
    }

    .hot-refresh {
      border: 1px solid var(--gray-200);
      border-radius: 3px;
      background: var(--gray-0);
      color: var(--gray-600);
      width: 34px;
      height: 34px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font: inherit;
      font-weight: 400;
      cursor: pointer;
      transition: var(--transition);
    }

    .hot-refresh .iconfont {
      font-size: 16px;
      transition: transform 220ms ease;
    }

    .hot-refresh:hover {
      color: var(--gray-700);
      background: var(--gray-100);
      border-color: var(--gray-300);
    }

    .hot-refresh:hover .iconfont {
      transform: rotate(90deg);
    }

    .hot-source-wrap {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
    }

    .hot-source-select {
      width: 100%;
      border: 1px solid var(--gray-200);
      border-radius: 3px;
      padding: 8px 30px 8px 10px;
      min-height: 34px;
      background: var(--gray-0);
      color: var(--gray-700);
      font: inherit;
      min-width: 0;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      transition: var(--transition);
    }

    .hot-source-select:hover {
      border-color: var(--gray-300);
      background: var(--gray-50);
    }

    .hot-source-arrow {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-500);
      font-size: 14px;
      pointer-events: none;
    }

    .hot-status {
      min-height: 0;
      margin: 0 0 4px;
      color: var(--gray-500);
      font-size: 0.85rem;
    }

    .hot-status:empty {
      display: none;
    }

    .hot-status.error {
      color: var(--danger);
    }

    .hot-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
    }

    .hot-list li {
      margin: 0;
      padding: 0;
    }

    .hot-item {
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 4px;
      align-items: baseline;
      padding: 3px 0;
      transition: var(--transition);
      min-height: 0;
    }

    .hot-item:hover {
      color: var(--blue-500);
    }

    .hot-item-static {
      cursor: default;
      pointer-events: none;
    }

    .rank {
      width: auto;
      height: auto;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--gray-500);
      border: none;
      background: transparent;
    }

    .rank.top3 {
      color: var(--red-500);
    }

    .hot-name {
      display: block;
      font-size: 15px;
      line-height: 1.5;
      color: var(--gray-700);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hot-meta {
      display: inline;
      margin-left: 4px;
      color: var(--gray-500);
      font-size: 0.8125rem;
    }

    .engine-tab:focus-visible,
    .group-tab:focus-visible,
    .search-btn:focus-visible,
    .hot-refresh:focus-visible,
    .hot-source-select:focus-visible,
    .theme-switch:focus-visible {
      outline: 2px solid #93c5fd;
      outline-offset: 2px;
    }

    .hot-refresh:disabled,
    .hot-source-select:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .search-input:focus-visible {
      outline: none;
    }

    @keyframes engine-tab-float {
      0%,
      100% {
        transform: translateY(-2px);
      }
      50% {
        transform: translateY(-4px);
      }
    }

    @keyframes float-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1280px) {
      :root {
        --content-max: 1160px;
      }

      .main {
        grid-template-columns: minmax(0, 1fr) 300px;
      }

      .site-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 180px));
      }
    }

    @media (max-width: 1080px) {
      :root {
        --panel-pad: 16px;
        --section-gap: 12px;
      }

      .main {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .hot-panel {
        position: static;
      }
    }

    @media (max-width: 1024px) {
      .hero-top {
        min-height: 56px;
      }

      .clock-main,
      .region-main,
      .weather-main {
        font-size: 13px;
      }

      .search-shell {
        width: min(640px, 100%);
        margin-top: 28px;
      }

      .engine-tabs {
        justify-content: flex-start;
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 0;
        margin-bottom: 0;
      }

      .engine-tab {
        flex: 0 0 auto;
      }
    }

    @media (max-width: 760px) {
      html,
      body {
        width: 100%;
        min-width: 0;
      }

      .hero,
      .main {
        width: 100%;
        max-width: 100%;
      }

      :root {
        --edge-pad: 14px;
        --panel-pad: 14px;
      }

      .hero-inner {
        padding: 0 max(14px, env(safe-area-inset-right)) 14px max(14px, env(safe-area-inset-left));
      }

      .main {
        padding: 0 max(14px, env(safe-area-inset-right)) 18px max(14px, env(safe-area-inset-left));
      }

      .hero-top {
        min-height: 52px;
        align-items: center;
        padding-top: 0;
        gap: 8px;
      }

      .top-center {
        width: auto;
        min-width: 0;
        flex: 1 1 auto;
        justify-content: flex-start;
        text-align: left;
        gap: 4px 8px;
      }

      .theme-switch {
        flex: 0 0 44px;
      }

      .search-shell {
        margin-top: 20px;
        width: 100%;
        min-width: 0;
        max-width: 100%;
      }

      .engine-tabs {
        position: static;
        top: auto;
        left: auto;
        width: 100%;
        margin: 0 0 10px;
        padding: 2px 0 6px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
        gap: 8px;
        overflow: visible;
        max-width: 100%;
      }

      .engine-tab {
        min-width: 0;
        width: 100%;
        min-height: 36px;
        padding: 7px 10px;
        font-size: 15px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.28);
        white-space: normal;
        text-align: center;
        line-height: 1.2;
        overflow-wrap: anywhere;
        opacity: 1;
      }

      .engine-tab.active {
        transform: none;
        animation: none;
        text-shadow: none;
        background: rgba(255, 255, 255, 0.28);
        border-color: rgba(255, 255, 255, 0.42);
      }

      :root[theme-mode='dark'] .engine-tab {
        background: rgba(15, 23, 42, 0.46);
        border-color: rgba(148, 163, 184, 0.35);
      }

      :root[theme-mode='dark'] .engine-tab.active {
        background: rgba(15, 23, 42, 0.68);
        border-color: rgba(148, 163, 184, 0.5);
      }

      .search-form {
        height: 52px;
        min-height: 52px;
        border-radius: 12px;
      }

      .search-btn {
        width: 48px;
        flex-basis: 48px;
      }

      .search-input {
        font-size: 16px;
        padding: 0 12px;
      }

      .search-mark {
        width: 48px;
        flex-basis: 48px;
      }

      .search-mark .iconfont,
      .search-btn .iconfont {
        font-size: 24px;
      }

      .section-head {
        min-height: 36px;
        padding: 8px 14px;
      }

      .site-grid {
        grid-template-columns: repeat(auto-fit, minmax(min(150px, 100%), 1fr));
        gap: 10px;
        align-items: stretch;
        max-width: 100%;
      }

      .site-card {
        width: 100%;
        min-height: 72px;
        height: 72px;
        padding: 12px 12px 12px 58px;
        max-width: 100%;
      }

      .site-icon {
        top: 50%;
        margin-top: -18px;
        left: 12px;
        width: 36px;
        height: 36px;
      }

      .site-card > span:last-child {
        margin-left: 0;
        width: 100%;
      }

      .site-title {
        font-size: 15px;
        line-height: 1.35;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
        overflow-wrap: anywhere;
      }

      .site-desc {
        font-size: 12.5px;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
        overflow-wrap: anywhere;
      }

      .group-tabs {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
        margin: 0 12px;
        padding: 8px 0 10px;
        gap: 8px;
        background: transparent;
        overflow: visible;
      }

      .group-tab {
        width: 100%;
        min-width: 0;
        min-height: 38px;
        padding: 8px 10px;
        border: 1px solid var(--gray-200);
        background: var(--gray-0);
        white-space: normal;
        text-align: center;
        line-height: 1.25;
        overflow-wrap: anywhere;
        font-size: 13.5px;
      }

      .group-tab.active {
        background: rgba(239, 68, 68, 0.08);
        border-color: rgba(239, 68, 68, 0.34);
      }

      .bookmark-sections {
        padding: 8px 14px;
      }

      .bookmark-section {
        padding: 10px;
        border-radius: 8px;
      }

      .bookmark-section-head {
        margin-bottom: 8px;
        gap: 6px;
        font-size: 16px;
      }

      .hot-panel {
        padding: 10px 14px 12px;
      }
    }

    @media (max-width: 560px) {
      .hero {
        min-height: 250px;
      }

      .theme-switch {
        width: 44px;
        height: 44px;
        padding: 0;
        justify-content: center;
      }

      .top-center {
        gap: 2px 8px;
      }

      .clock-main {
        flex: 1 0 100%;
      }

      .clock-main,
      .region-main,
      .weather-main {
        font-size: 13px;
      }

      .section-title {
        font-size: 17px;
      }

      .top-sep {
        display: none;
      }

      .search-shell {
        margin-top: 18px;
      }

      .search-form {
        height: 48px;
        min-height: 48px;
        border-radius: 11px;
      }

      .search-input {
        padding: 0 10px;
      }

      .search-mark {
        width: 44px;
        flex-basis: 44px;
      }

      .search-mark .iconfont {
        font-size: 22px;
      }

      .search-btn {
        width: 44px;
        flex-basis: 44px;
      }

      .search-btn .iconfont {
        font-size: 22px;
      }

      .site-search-title {
        font-size: 15px;
      }

      .group-tabs {
        margin: 0 10px;
        grid-template-columns: repeat(auto-fit, minmax(84px, 1fr));
        gap: 7px;
      }

      .group-tab {
        min-width: 0;
        min-height: 36px;
        padding: 7px 9px;
      }

      .site-grid {
        grid-template-columns: repeat(auto-fit, minmax(min(132px, 100%), 1fr));
        gap: 8px;
      }

      .bookmark-section {
        padding: 9px;
      }

      .bookmark-section-head {
        margin-bottom: 7px;
        font-size: 15px;
      }

      .site-card {
        min-height: 68px;
        height: 68px;
        padding: 10px 10px 10px 54px;
      }

      .site-icon {
        left: 8px;
        width: 32px;
        height: 32px;
        margin-top: -16px;
      }

      .site-card > span:last-child {
        margin-left: 0;
        width: 100%;
      }

      .site-title {
        font-size: 14px;
        line-height: 1.3;
        margin-bottom: 1px;
        white-space: nowrap;
        display: block;
      }

      .site-desc {
        display: none;
      }

    }

    @media (max-width: 420px) {
      .hero-inner {
        padding-top: 12px;
      }

      .engine-tabs {
        grid-template-columns: repeat(auto-fit, minmax(78px, 1fr));
        gap: 6px;
      }

      .engine-tab {
        padding: 6px 10px;
        min-height: 36px;
        font-size: 15px;
      }

      .search-form {
        height: 44px;
        min-height: 44px;
      }

      .search-mark,
      .search-btn {
        width: 38px;
        flex-basis: 38px;
      }

      .search-mark .iconfont,
      .search-btn .iconfont {
        font-size: 19px;
      }

      .group-tabs {
        margin: 0 8px;
        grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
        gap: 6px;
      }

      .group-tab {
        min-width: 0;
        min-height: 34px;
        padding: 6px 8px;
        font-size: 13px;
      }

      .bookmark-section {
        padding: 10px;
      }

      .site-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .site-title {
        font-size: 0.95rem;
      }

      .site-desc {
        display: block;
        font-size: 12px;
        white-space: nowrap;
        text-overflow: ellipsis;
        overflow: hidden;
      }

    }

    @media (max-width: 360px) {
      .site-card {
        min-height: 66px;
        height: 66px;
        padding-left: 46px;
      }

      .site-icon {
        left: 7px;
        width: 28px;
        height: 28px;
        margin-top: -14px;
      }

      .group-tab {
        min-width: 0;
      }
    }

    @media (any-hover: none) {
      .site-card:hover,
      .site-card.is-hover,
      .site-card:hover .site-icon,
      .site-card.is-hover .site-icon,
      .hot-item:hover,
      .search-btn:hover,
      .engine-tab:hover,
      .group-tab:hover {
        transform: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-top">
        <div class="top-center">
          <span id="clock-main" class="clock-main">-- 月 -- 日 -- 时 -- 分 -- 秒</span>
          <span class="top-sep"> </span>
          <span id="region-main" class="region-main">定位中</span>
          <span class="top-sep"> </span>
          <span id="weather-main" class="weather-main">☁ 天气加载中</span>
        </div>
        <a id="github-link" class="theme-switch github-link is-hidden" href="#" target="_blank" rel="noopener noreferrer" aria-label="打开 GitHub" title="打开 GitHub">
          <i class="iconfont icon-github" aria-hidden="true"></i>
        </a>
        <button id="theme-toggle" class="theme-switch" type="button" aria-label="切换主题" title="切换主题">
          <span id="theme-toggle-icon" class="theme-switch-symbol" aria-hidden="true">☀</span>
        </button>
      </div>

      <section class="search-shell">
        <div id="engine-tabs" class="engine-tabs"></div>
        <form id="search-form" class="search-form">
          <div class="search-mark">
            <i id="engine-icon" class="iconfont icon-baidu" aria-hidden="true"></i>
            <span id="engine-icon-fallback" class="icon-fallback"></span>
          </div>
          <input id="search-input" class="search-input" type="search" autocomplete="off" placeholder="输入关键词后回车搜索">
          <button class="search-btn" type="submit" aria-label="搜索"><i class="iconfont icon-md-search"></i></button>
        </form>
        <div id="site-search-panel" class="site-search-panel" role="list" aria-label="站内搜索结果" hidden></div>
        <p id="search-tip" class="search-tip" aria-live="polite"></p>
      </section>
    </div>
  </header>

  <main class="main">
    <section class="panel bookmarks">
      <div class="section-head">
        <h1 class="section-title"><span id="bookmark-title-text">自定义网站</span><i class="iconfont icon-md-attach" aria-hidden="true"></i></h1>
      </div>

      <div id="group-tabs" class="group-tabs"></div>
      <div id="bookmark-sections" class="bookmark-sections"></div>
    </section>

    <aside class="panel hot-panel">
      <div class="hot-head">
        <div class="hot-source-wrap">
          <select id="hot-source" class="hot-source-select" aria-label="选择热点来源"></select>
          <i class="iconfont icon-md-arrow-dropdown hot-source-arrow" aria-hidden="true"></i>
        </div>
        <button id="reload-hot" class="hot-refresh" type="button" aria-label="刷新热点" title="刷新热点">
          <i class="iconfont icon-md-sync" aria-hidden="true"></i>
        </button>
      </div>
      <p id="hot-status" class="hot-status"></p>
      <ol id="hot-list" class="hot-list"></ol>
    </aside>
  </main>

  <script defer src="./assets/js/portal-app.js"></script>
</body>
</html>
