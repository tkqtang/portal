ui:
  pageTitle: "tkqtang Portal"
  bookmarkTitle: "自定义"
  favicon: "./assets/favicon.png"
  githubUrl: "https://github.com/tkqtang/portal"
  showClock: true
  showRegion: true
  showWeather: true
  showSearch: true
  showBookmarks: true
  showHotPanel: true
theme:
  heroImage: "./assets/wallpaper/cat.png"
  heroImageLight: "./assets/wallpaper/cat.png"
  heroImageDark: "./assets/wallpaper/cat.png"
  mode: "auto"
  enableToggle: true
search:
  defaultEngine: "bing"
  engines:
    - key: "baidu"
      name: "百度"
      enabled: true
      iconClass: "iconfont icon-baidu"
      iconText: "百"
      placeholder: "百度搜索"
      mode: "url"
      url: "https://www.baidu.com/s"
      queryKey: "word"
      params: {}
    - key: "google"
      name: "Google"
      enabled: true
      iconClass: "iconfont icon-chrome"
      iconText: "G"
      placeholder: "在 Google 中搜索"
      mode: "url"
      url: "https://www.google.com/search"
      queryKey: "q"
      params: {}
    - key: "bing"
      name: "Bing"
      enabled: true
      iconClass: "iconfont icon-yingyong"
      iconText: "B"
      placeholder: "在 Bing 中搜索"
      mode: "url"
      url: "https://cn.bing.com/search"
      queryKey: "q"
      params: {}
    - key: "site"
      name: "站内搜"
      enabled: true
      iconClass: "iconfont icon-md-planet"
      iconText: "站"
      placeholder: "输入站内关键词，匹配书签标题、网址和描述"
      mode: "site-local"
    - key: "metaso"
      name: "秘塔AI"
      enabled: true
      iconClass: "iconfont icon-md-cube"
      iconText: "秘"
      placeholder: "输入问题，使用 AI 搜索"
      mode: "url"
      url: "https://metaso.cn/"
      queryKey: "q"
      params: {}
bookmarks:
  source: "./links.yaml"
  visibleGroups: []
  excludeGroups: []
  maxLinksPerGroup: 0
  requestTimeoutMs: 5000
hot:
  maxItems: 15
  defaultSource: "weibo"
  sources:
    - key: "weibo"
      name: "微博热榜"
      enabled: true
      targets:
        - kind: "generic"
          enabled: true
          url: "https://api.cenguigui.cn/api/juhe/hotlist.php?type=weibo"
          timeoutMs: 7000
    - key: "douyin"
      name: "抖音热榜"
      enabled: true
      targets:
        - kind: "generic"
          enabled: true
          url: "https://api.cenguigui.cn/api/juhe/hotlist.php?type=douyin"
          timeoutMs: 7000
    - key: "github-star-growth"
      name: "Github 增长榜"
      enabled: true
      targets:
        - kind: "generic"
          enabled: true
          url: "https://api.ossinsight.io/v1/trends/repos?period=past_week&language=All"
          timeoutMs: 8000
weather:
  cityName: "杭州市"
  latitude: 30.2741
  longitude: 120.1551
  weatherApiUrl: "https://api.open-meteo.com/v1/forecast?latitude=30.2741&longitude=120.1551&current=temperature_2m,weather_code&timezone=Asia%2FShanghai"
  weatherUrlTemplate: "https://api.open-meteo.com/v1/forecast?latitude={lat}&longitude={lon}&current=temperature_2m,weather_code&timezone=auto"
  weatherRequestTimeoutMs: 4500
